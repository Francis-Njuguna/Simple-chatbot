services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — persistent relational store
  # Run standalone: docker compose up postgres -d
  # Tables are created automatically on first app startup via init_db().
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: amref
      POSTGRES_PASSWORD: amref_secret
      POSTGRES_DB: amref_helpdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amref -d amref_helpdesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # FastAPI backend
  # LLM  : Anthropic Claude (ANTHROPIC_API_KEY required in .env)
  # Embed: Ollama nomic-embed-text (Ollama must be running on the host)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      target: backend
    image: amref-helpdesk-rag-backend
    ports:
      - "8000:8000"
    # Load the real secrets file (.env), NOT .env.example.
    # Copy .env.example → .env and fill in real values before running.
    env_file:
      - .env
    environment:
      # --- PostgreSQL credentials (must mirror the postgres service above) ---
      # Declared explicitly here so they are visible, auditable, and cannot be
      # silently shadowed by a stale or missing .env value.
      POSTGRES_USER: amref
      POSTGRES_PASSWORD: amref_secret
      POSTGRES_DB: amref_helpdesk

      # --- Assembled DATABASE_URL (convenience; config.py also builds it from
      #     the four POSTGRES_* parts, so both must stay in sync) ---
      DATABASE_URL: postgresql+asyncpg://amref:amref_secret@postgres:5432/amref_helpdesk

      # --- Docker-internal host / path overrides ---
      POSTGRES_HOST: postgres         # service name, not localhost
      POSTGRES_PORT: "5432"
      CHROMA_PERSIST_DIR: /app/data/chroma
      DATA_DIR: /app/data
      RAW_DATA_DIR: /app/data/raw
      PROCESSED_DATA_DIR: /app/data/processed
      IMAGES_DIR: /app/data/images
      STATIC_IMAGES_DIR: /app/backend/app/static/images
      LOG_FILE: /app/logs/app.log

      # --- LLM ---
      LLM_PROVIDER: anthropic
      ANTHROPIC_MODEL: claude-sonnet-4-5

      # --- Embeddings (Ollama runs on the Docker host) ---
      EMBEDDING_PROVIDER: ollama
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux host-gateway support
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backend/app/static/images:/app/backend/app/static/images
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Streamlit frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      target: frontend
    image: amref-helpdesk-rag-frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://backend:8000/api/v1
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy    # wait until backend /health passes
    command: >
      streamlit run frontend/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true

volumes:
  postgres_data:
