server {
    # ${PORT} is injected at container start via envsubst (see Dockerfile.widget);
    # Railway assigns this dynamically at runtime.
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Ensure .js files are always served with the correct Content-Type
    # (required for cross-origin <script> embedding on the PHP site).
    types {
        text/html                html;
        text/css                 css;
        application/javascript   js;
    }
    default_type application/octet-stream;

    location / {
        # Permissive CORS so the widget's JS/CSS can be fetched
        # cross-origin from the separate PHP website's domain.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        # Handle CORS preflight requests.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        try_files $uri $uri/ =404;
    }
}
